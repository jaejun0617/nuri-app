// 파일: android/settings.gradle

pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
    includeBuild("../node_modules/@react-native/gradle-plugin")
}

plugins {
    id("com.facebook.react.settings")
}

dependencyResolutionManagement {
    // ✅ 다시 표준 설정인 PREFER_PROJECT로 복구 (build.gradle에서 경로를 잡아줬으므로 안전합니다)
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)

    repositories {
        google()
        mavenCentral()
        maven { url("https://devrepo.kakao.com/nexus/content/groups/public/") }

        // 🔥 AsyncStorage v3 로컬 경로
        maven { 
            url("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo") 
        }

        maven { url("$rootDir/../node_modules/react-native/android") }
        maven { url("$rootDir/../node_modules/jsc-android/dist") }
        maven { url("https://www.jitpack.io") }
    }
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

rootProject.name = "nuri"
include(":app")
