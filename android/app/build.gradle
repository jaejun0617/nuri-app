// 파일: android/app/build.gradle
// 목적:
// - app 모듈에서 RN 플러그인을 plugins DSL로 적용
// - compileSdk/targetSdk/minSdk 등을 rootProject.ext에서 가져와 고정
// - Hermes/JSC 분기 유지

plugins {
  id("com.android.application")
  id("org.jetbrains.kotlin.android")
  id("com.facebook.react")
  id("com.google.gms.google-services")
  id("com.google.firebase.crashlytics")
}

react {
  autolinkLibrariesWithApp()
}

def geolocationCodegenScript = rootProject.file("../scripts/ensure-geolocation-codegen.js")

tasks.register("ensureGeolocationCodegen", Exec) {
  workingDir rootProject.projectDir.parentFile
  commandLine("node", geolocationCodegenScript.absolutePath)
}

preBuild.dependsOn("ensureGeolocationCodegen")

def enableProguardInReleaseBuilds = false
def jscFlavor = "io.github.react-native-community:jsc-android:2026004.+"

android {
  namespace "com.nuri"

  ndkVersion rootProject.ext.ndkVersion
  buildToolsVersion rootProject.ext.buildToolsVersion
  compileSdkVersion rootProject.ext.compileSdkVersion

  defaultConfig {
    applicationId "com.nuri.app"
    minSdkVersion rootProject.ext.minSdkVersion
    targetSdkVersion rootProject.ext.targetSdkVersion
    versionCode 1
    versionName "1.0"
  }

  signingConfigs {
    debug {
      storeFile file("debug.keystore")
      storePassword "android"
      keyAlias "androiddebugkey"
      keyPassword "android"
    }
    release {
      // v1.0 Play Store 제출용 upload key. CI/운영 빌드는 환경변수로 덮어쓸 수 있다.
      storeFile file(System.getenv("NURI_UPLOAD_STORE_FILE") ?: "nuri-upload.keystore")
      storePassword System.getenv("NURI_UPLOAD_STORE_PASSWORD") ?: "android"
      keyAlias System.getenv("NURI_UPLOAD_KEY_ALIAS") ?: "my-key-alias"
      keyPassword System.getenv("NURI_UPLOAD_KEY_PASSWORD") ?: "android"
    }
  }

  buildTypes {
    debug {
      signingConfig signingConfigs.debug
    }
    release {
      signingConfig signingConfigs.release
      minifyEnabled enableProguardInReleaseBuilds
      proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
    }
  }
}

dependencies {
  implementation("com.facebook.react:react-android")

  if (project.hasProperty('hermesEnabled') && hermesEnabled.toBoolean()) {
    implementation("com.facebook.react:hermes-android")
  } else {
    implementation(jscFlavor)
  }
}

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"
