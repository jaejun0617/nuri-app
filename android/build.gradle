// 파일: android/build.gradle
// 목적: Gradle 최신 규칙에 따른 플러그인 및 전역 저장소 설정

buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
        agpVersion = "8.4.2"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:${agpVersion}")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
    }
}

// ✅ [중요] plugins 블록은 다른 설정(allprojects 등)보다 반드시 위에 있어야 합니다.
plugins {
    id("com.google.gms.google-services") version "4.4.4" apply false
    id("com.google.firebase.crashlytics") version "3.0.6" apply false
    id("com.facebook.react.rootproject")
}

// ✅ 모든 서브 프로젝트에 적용될 저장소 설정
allprojects {
    repositories {
        google()
        mavenCentral()
        
        // 🔥 AsyncStorage v3 네이티브 라이브러리 로컬 경로
        maven {
            url "$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo"
        }
        
        // React Native 및 기타 라이브러리용
        maven { url("$rootDir/../node_modules/react-native/android") }
        maven { url("$rootDir/../node_modules/jsc-android/dist") }
        maven { url "https://www.jitpack.io" }
    }
}
